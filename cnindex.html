function getNextCohortCountdown() {
  const now = Date.now();
  const nextIndex = WEEK_START_DATES.findIndex(d => new Date(d).getTime() > now);
  const allStarted = nextIndex === -1;
  const target = allStarted ? now : new Date(WEEK_START_DATES[nextIndex]).getTime();
  const diff = Math.max(0, target - now);
  return {
    allStarted,
    nextIndex,
    nextLabel: allStarted ? null : CALENDAR_WEEKS[nextIndex],
    days: Math.floor(diff / 86400000),
    hours: Math.floor((diff % 86400000) / 3600000),
    minutes: Math.floor((diff % 3600000) / 60000),
    seconds: Math.floor((diff % 60000) / 1000),
  };
}

  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return m ? [parseInt(m[1],16)/255,parseInt(m[2],16)/255,parseInt(m[3],16)/255] : [1,1,1];
};

function HeroCanvas() {
  const containerRef = React.useRef();
  const stateRef = React.useRef({});
  React.useEffect(() => {
    const container = containerRef.current;
    if (!container) return;
    let cancelled = false;
    const loadOGL = () => new Promise(res => {
      if (window.__OGL__) { res(window.__OGL__); return; }
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/ogl@1.0.8/dist/ogl.umd.js';
      s.onload = () => { window.__OGL__ = window.OGL; res(window.OGL); };
      document.head.appendChild(s);
    });
    loadOGL().then(OGL => {
      if (cancelled || !container) return;
      const { Renderer, Program, Triangle, Mesh } = OGL;
      const renderer = new Renderer({ dpr:Math.min(devicePixelRatio,2), alpha:true });
      const gl = renderer.gl;
      gl.canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
      container.appendChild(gl.canvas);
      const vert = `attribute vec2 position;varying vec2 vUv;void main(){vUv=position*0.5+0.5;gl_Position=vec4(position,0.0,1.0);}`;
      const frag = `precision highp float;
uniform float iTime;uniform vec2 iResolution;uniform vec2 rayPos;uniform vec2 rayDir;
uniform vec3 raysColor;uniform float raysSpeed;uniform float lightSpread;uniform float rayLength;
uniform float fadeDistance;uniform vec2 mousePos;uniform float mouseInfluence;varying vec2 vUv;
float rayStrength(vec2 src,vec2 refDir,vec2 coord,float sA,float sB,float spd){
  vec2 toCoord=coord-src;vec2 dn=normalize(toCoord);float ca=dot(dn,refDir);
  float spread=pow(max(ca,0.0),1.0/max(lightSpread,0.001));
  float dist=length(toCoord);float maxD=iResolution.x*rayLength;
  float lFall=clamp((maxD-dist)/maxD,0.0,1.0);
  float fFall=clamp((iResolution.x*fadeDistance-dist)/(iResolution.x*fadeDistance),0.4,1.0);
  float base=clamp((0.45+0.15*sin(ca*sA+iTime*spd))+(0.3+0.2*cos(-ca*sB+iTime*spd)),0.0,1.0);
  return base*lFall*fFall*spread;}
void main(){
  vec2 coord=vec2(gl_FragCoord.x,iResolution.y-gl_FragCoord.y);
  vec2 finalDir=rayDir;
  if(mouseInfluence>0.0){vec2 mPos=mousePos*iResolution.xy;finalDir=normalize(mix(rayDir,normalize(mPos-rayPos),mouseInfluence));}
  vec4 r1=vec4(1.0)*rayStrength(rayPos,finalDir,coord,36.2214,21.11349,1.5*raysSpeed);
  vec4 r2=vec4(1.0)*rayStrength(rayPos,finalDir,coord,22.3991,18.0234,1.1*raysSpeed);
  vec4 col=r1*0.5+r2*0.4;
  float t=coord.y/iResolution.y;
  col.rgb*=mix(vec3(0.97,0.64,0.2),vec3(0.24,0.76,0.91),t*0.7);
  col.rgb*=raysColor;gl_FragColor=col;}`;
      const uniforms = {
        iTime:{value:0},iResolution:{value:[1,1]},rayPos:{value:[0,0]},rayDir:{value:[0,1]},
        raysColor:{value:[1,1,1]},raysSpeed:{value:0.8},lightSpread:{value:1.8},
        rayLength:{value:2.0},fadeDistance:{value:1.0},mousePos:{value:[0.5,0.5]},mouseInfluence:{value:0.12},
      };
      const mesh = new Mesh(gl,{ geometry:new Triangle(gl), program:new Program(gl,{vertex:vert,fragment:frag,uniforms}) });
      const resize = () => {
        const w=container.clientWidth,h=container.clientHeight;
        renderer.setSize(w,h);
        const dpr=renderer.dpr;
        uniforms.iResolution.value=[w*dpr,h*dpr];
        uniforms.rayPos.value=[w*dpr*0.5,-0.2*h*dpr];
        uniforms.rayDir.value=[0,1];
      };
      const mouse={x:0.5,y:0.5},smooth={x:0.5,y:0.5};
      const onMouse=e=>{ const r=container.getBoundingClientRect(); mouse.x=(e.clientX-r.left)/r.width; mouse.y=(e.clientY-r.top)/r.height; };
      window.addEventListener('mousemove',onMouse);
      window.addEventListener('resize',resize);
      resize();
      let raf;
      const loop=t=>{ if(cancelled)return; uniforms.iTime.value=t*0.001; smooth.x=smooth.x*0.93+mouse.x*0.07; smooth.y=smooth.y*0.93+mouse.y*0.07; uniforms.mousePos.value=[smooth.x,smooth.y]; renderer.render({scene:mesh}); raf=requestAnimationFrame(loop); };
      raf=requestAnimationFrame(loop);
      stateRef.current.cleanup=()=>{ cancelled=true; cancelAnimationFrame(raf); window.removeEventListener('mousemove',onMouse); window.removeEventListener('resize',resize); try{ gl.getExtension('WEBGL_lose_context')?.loseContext(); gl.canvas.parentNode?.removeChild(gl.canvas); }catch(e){} };
    });
    return ()=>{ cancelled=true; stateRef.current.cleanup?.(); };
  },[]);
  return <div ref={containerRef} style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>;
}

function GlobalMap() {
  const [vis,setVis]=React.useState(false); const mapRef=React.useRef(); const sectionRef=React.useRef();
  React.useEffect(()=>{ const obs=new IntersectionObserver(([e])=>{ if(e.isIntersecting)setVis(true); },{threshold:0.15}); if(sectionRef.current)obs.observe(sectionRef.current); return()=>obs.disconnect(); },[]);
  React.useEffect(()=>{
    if(!vis||!mapRef.current)return;
    const el=mapRef.current;
    const PINS=[
      {name:'加拿大',       lat:56,   lon:-96,  flag:'🇨🇦',labelDir:'above'},
      {name:'美國',lat:37,   lon:-98,  flag:'🇺🇸',labelDir:'below'},
      {name:'巴拿馬',       lat:9,    lon:-80,  flag:'🇵🇦',labelDir:'below'},
      {name:'英國',lat:54,  lon:-2,   flag:'🇬🇧',labelDir:'above'},
      {name:'巴基斯坦',     lat:30,   lon:69,   flag:'🇵🇰',labelDir:'above'},
      {name:'印度',        lat:22,   lon:80,   flag:'🇮🇳',labelDir:'below'},
      {name:'卡塔爾',        lat:25.3, lon:51.2, flag:'🇶🇦',labelDir:'above'},
      {name:'印尼',    lat:-4,   lon:118,  flag:'🇮🇩',labelDir:'below'},
      {name:'越南',      lat:14,   lon:106,  flag:'🇻🇳',labelDir:'below'},
      {name:'南韓',  lat:37,   lon:128,  flag:'🇰🇷',labelDir:'above'},
      {name:'中國',        lat:36,   lon:100,  flag:'🇨🇳',labelDir:'above'},
      {name:'香港',    lat:21.5, lon:119,  flag:'🇭🇰',labelDir:'above'},
    ];
    const loadScript=(src,check)=>new Promise(res=>{ if(window[check]){res();return;} const s=document.createElement('script'); s.src=src; s.onload=res; document.head.appendChild(s); });
    Promise.all([
      loadScript('https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js','d3'),
      loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js','topojson'),
    ]).then(()=>{
      const W=el.parentElement.clientWidth||620, H=Math.round(W*0.62);
      const svg=d3.select(el).attr('viewBox',`0 0 ${W} ${H}`).attr('width',W).attr('height',H);
      svg.selectAll('*').remove();
      const proj=d3.geoNaturalEarth1().scale(W/6.3).translate([W/2,H/2]);
      const path=d3.geoPath().projection(proj);
      svg.append('path').datum({type:'Sphere'}).attr('d',path).attr('fill','rgba(255,255,255,0.03)').attr('stroke','rgba(255,255,255,0.08)').attr('stroke-width',0.5);
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json()).then(world=>{
        const countries=topojson.feature(world,world.objects.countries);
        svg.append('path').datum(d3.geoGraticule()()).attr('d',path).attr('fill','none').attr('stroke','rgba(255,255,255,0.04)').attr('stroke-width',0.4);
        svg.append('g').selectAll('path').data(countries.features).join('path').attr('d',path).attr('fill','rgba(255,255,255,0.07)').attr('stroke','rgba(255,255,255,0.18)').attr('stroke-width',0.5);
        PINS.forEach((pin,i)=>{
          const coords=proj([pin.lon,pin.lat]); if(!coords)return;
          const [x,y]=coords; const above=pin.labelDir==='above';
          const g=svg.append('g').attr('opacity',0).style('animation',`pillPop 0.45s ease ${i*0.07}s both`);

          const labelY=above?y-8:y+22; const labelW=pin.name.length*5.2+12;
          g.append('rect').attr('x',x-labelW/2).attr('y',labelY-9).attr('width',labelW).attr('height',12).attr('rx',3).attr('fill','rgba(13,23,48,0.82)');
          g.append('text').attr('x',x).attr('y',labelY).attr('text-anchor','middle').attr('fill','rgba(255,255,255,0.9)').attr('font-size',7.5).attr('font-family','Source Sans 3,sans-serif').attr('font-weight',600).text(pin.name);
        });
      });
    });
  },[vis]);

                <span style={{ color:ORANGE }}>Debate</span><span style={{ color:SKY }}>Craft</span>
              </div>
              <div style={{ fontSize:10, fontWeight:600, color:'rgba(255,255,255,0.32)', letterSpacing:'0.12em', textTransform:'uppercase', marginTop:2 }}>學生賦予學生力量</div>
            </div>
          </a>
          <div style={{ fontSize:13, color:'rgba(255,255,255,0.32)', maxWidth:320, textAlign:'right', lineHeight:1.6 }}>為三至十二年級學生提供免費辯論及科學課程，覆蓋全球12多個國家同地區。</div>
        </div>
      </div>
      <div style={{ maxWidth:1200, margin:'0 auto' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
          {cols.map((col,i)=>(

/* ── 過渡頁面 ───────────────────────────────── */
function PageStub({ title, setPage }) {
  return (
    <div style={{ background:CREAM, minHeight:'60vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ textAlign:'center', padding:40 }}>
        <div style={{ fontSize:11, fontWeight:700, color:ORANGE, letterSpacing:'0.14em', textTransform:'uppercase', marginBottom:14 }}>頁面預覽</div>
        <h1 className="serif" style={{ fontSize:48, fontWeight:800, color:NAVY, marginBottom:12 }}>{title}</h1>
        <p style={{ fontSize:14, color:'rgba(17,29,60,0.5)', marginBottom:28 }}>完整頁面設計進行中</p>
        <button onClick={()=>setPage('home')} style={{ background:NAVY, color:WHITE, border:'none', borderRadius:5, padding:'12px 22px', fontFamily:'Source Sans 3,sans-serif', fontWeight:700, fontSize:13, cursor:'pointer' }}>← 返回主頁</button>
      </div>
    </div>
  );
}

/* ── 微調面板（保留功能）────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#F7A234",
  "heroSize": "72",
  "showTestimonials": true
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweak, page, setPage, onClose }) {
  const pages={home:'主頁',story:'使命',offerings:'課程','get-involved':'參與我哋'};
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:WHITE, borderRadius:12, padding:'18px 20px', boxShadow:'0 12px 48px rgba(0,0,0,0.2)', minWidth:240, fontFamily:'Source Sans 3,sans-serif' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontWeight:700, fontSize:13, color:NAVY }}>微調</span>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:17, color:'#7c7c8a' }}>×</button>
      </div>
      <div style={{ fontSize:10, fontWeight:700, color:'#7c7c8a', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:8 }}>主題顏色</div>
      <div style={{ display:'flex', gap:8, marginBottom:14 }}>
        {[ORANGE,'#3DC3E8','#dc2626','#764ba2'].map(c=>(
          <div key={c} onClick={()=>setTweak('accentColor',c)} style={{ width:26, height:26, borderRadius:'50%', background:c, cursor:'pointer', border:tweaks.accentColor===c?`3px solid ${NAVY}`:'2px solid transparent', transition:'border 0.15s' }}></div>
        ))}
      </div>
      <div style={{ fontSize:10, fontWeight:700, color:'#7c7c8a', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:8 }}>導航</div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:5 }}>
        {Object.entries(pages).map(([key,label])=>(
          <button key={key} onClick={()=>setPage(key)} style={{ background:page===key?NAVY:'#f5f0e8', color:page===key?WHITE:NAVY, border:`1px solid ${page===key?NAVY:'#e4e4e7'}`, borderRadius:5, padding:'6px 8px', fontSize:11, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>{label}</button>
        ))}
      </div>
    </div>
  );
}

/* ── 主程式（完全保留邏輯）─────────────────────────────────────── */
function App() {
  const [page,setPage]=React.useState('home');
  const [tweaks,setTweaksState]=React.useState(TWEAK_DEFAULTS);
  const [tweakVisible,setTweakVisible]=React.useState(false);

  React.useEffect(()=>{
    const handler=e=>{ if(e.data?.type==='__activate_edit_mode') setTweakVisible(true); if(e.data?.type==='__deactivate_edit_mode') setTweakVisible(false); };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',handler);
  },[]);

  const setTweak=(key,val)=>{ setTweaksState(p=>({...p,[key]:val})); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:val}},'*'); };
  const navigate=p=>{ setPage(p); document.getElementById('scroll-root')?.scrollTo(0,0); };

  const renderPage=()=>{
    switch(page){
      case 'home': return (<><Hero setPage={navigate}/><FirstClassCountdown/><HowToJoinMini/><Programs setPage={navigate}/><CalendarVisual/><StatsBar/><LearningInAction/><Credibility/><GlobalMap/><MissionCards/><Skills/><CTABand setPage={navigate}/></>);
      default: return <PageStub title={page.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())} setPage={navigate}/>;
    }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      {tweakVisible && <TweaksPanel tweaks={tweaks} setTweak={setTweak} page={page} setPage={navigate} onClose={()=>{ setTweakVisible(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }}/>}
      <Nav page={page} setPage={navigate}/>
      <div id="scroll-root" style={{ flex:1, overflowY:'auto' }}>
        {renderPage()}
        <Footer setPage={navigate}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
