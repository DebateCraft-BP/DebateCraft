      "name": "Is DebateCraft really free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. All DebateCraft courses are completely free, with no audition, essay, or hidden costs — ever."
      }
    },
    {
      "@type": "Question",
      "name": "What ages and experience levels can join?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Programs are open to students roughly Grades 3-12 (ages 8-18). Level 1 is designed for beginners with no prior experience, while WSDC, BP, Public Forum, and Bioethics tracks are for students 13+ with some debate background."
      }
    },
    {
      "@type": "Question",
      "name": "How do classes work?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Classes run live online in small groups of 5-10 students, so every student gets real speaking practice and direct feedback from coaches."
      }
    },
    {
      "@type": "Question",
      "name": "When does the program run and how do I apply?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Summer 2026 cohorts run across 8 weeks with rolling enrollment — new cohorts start most weeks from June through August. Apply with our free 2-minute interest form and DebateCraft will place you in the right cohort based on your age, experience, and goals."
      }
    },
    {
      "@type": "Question",
      "name": "Who teaches the courses?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Courses are taught by experienced coaches and competitive debaters, including students from Phillips Exeter Academy, with curriculum support from experienced coaches in the debate community."
      }
    },
    {
      "@type": "Question",
      "name": "Can I get involved beyond taking a course?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes — you can apply to coach, bring DebateCraft to your school as a partner, or support the program with a donation."
